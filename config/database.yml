default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV["DB_USER"] %>
  password: <%= ENV["DB_PASSWORD"] %>
  host: db

development:
  <<: *default
  database: digital_record_player_development

test:
  <<: *default
  database: digital_record_player_test

production:
  primary: &primary_production
    <<: *default
    database: digital_record_player_production
  cache:
    <<: *primary_production
    database: digital_record_player_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: digital_record_player_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: digital_record_player_production_cable
    migrations_paths: db/cable_migrate
